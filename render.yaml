services:
  - type: web
    name: privychat-backend
    runtime: node
    plan: starter
    region: oregon
    rootDir: backend
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        sync: false
      - key: PUBLIC_API_URL
        sync: false
      - key: PUBLIC_SOCKET_URL
        sync: false
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: MESSAGE_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
    disk:
      name: privychat-uploads
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: privychat-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci --include=dev && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_SOCKET_URL
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
